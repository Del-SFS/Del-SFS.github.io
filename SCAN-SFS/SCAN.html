<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SCAN</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0f1a;
    --card: #111827;
    --accent: #3b82f6;
    --text: #cbd5e1;
}

body {
    margin: 0;
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* 🌌 ESTRELAS */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0;
    animation: twinkle linear infinite;
}

@keyframes twinkle {
    0% {opacity:0;}
    50% {opacity:1;}
    100% {opacity:0;}
}

/* 🌠 ESTRELA CADENTE */
.shooting {
    position: fixed;
    width: 3px;
    height: 3px;
    background: white;
    box-shadow: 0 0 10px white;
    transform: rotate(45deg);
    animation: shoot 1s linear forwards;
}

@keyframes shoot {
    to {
        transform: translate(400px, 400px);
        opacity: 0;
    }
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 70px;
    color: white;
}

.hero p {
    max-width: 800px;
    margin: 20px auto;
    line-height: 1.8;
}

/* BOTÃO */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 25px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 6px;
}

/* SECTION */
.section {
    padding: 80px 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

/* CARDS */
.card {
    background: var(--card);
    padding: 30px;
    border-radius: 8px;
    margin-top: 20px;
}

.card p {
    line-height: 1.8;
}

img {
    width: 100%;
    border-radius: 6px;
    margin-top: 15px;
    box-shadow: 0 0 20px #000;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    color: #64748b;
}
</style>
</head>

<body>

<div class="header">
    <div><b>SCAN</b></div>
    <select onchange="setLang(this.value)">
        <option value="auto">AUTO</option>
        <option value="pt">PT</option>
        <option value="en">EN</option>
    </select>
</div>

<!-- BLOCO 1 -->
<div class="hero">
    <h1>SCAN</h1>
    <p data-i18n="desc"></p>
    <a href="downloads/scan.zip" class="btn" data-i18n="download"></a>
</div>

<!-- BLOCO 2 -->
<div class="section">
<div class="container">

<h2 data-i18n="info"></h2>

<div class="card">
<h3 data-i18n="tutorial_download"></h3>
<p data-i18n="how_download"></p>
</div>

<div class="card">
<h3 data-i18n="tutorial_use"></h3>
<p data-i18n="how_use"></p>
</div>

<!-- 🖼️ IMAGENS -->
<div class="card">
<h3 data-i18n="ui_title"></h3>

<img src="images/ui.png">

<p data-i18n="ui_desc"></p>

<img src="images/mod.png">

<p data-i18n="mod_desc"></p>
</div>

<div class="card">
<h3 data-i18n="system"></h3>
<p data-i18n="sys1"></p>
<p data-i18n="sys2"></p>
<p data-i18n="sys3"></p>
</div>

<div class="card">
<h3 data-i18n="why"></h3>
<p data-i18n="why1"></p>
<p data-i18n="why2"></p>
<p data-i18n="why3"></p>
</div>

<div class="card">
<h3 data-i18n="warning"></h3>
<p data-i18n="warn1"></p>
<p data-i18n="warn2"></p>
</div>

</div>
</div>

<!-- BLOCO 3 -->
<div class="section">
<div class="container">

<h2 data-i18n="credits"></h2>

<div class="card">
<p><b>Del</b></p>
<p>DelDoSFS@outlook.com</p>
<p data-i18n="collab"></p>
</div>

</div>
</div>

<footer>SCAN • by Del</footer>

<script>
function getLang(){
 let l=navigator.language.slice(0,2);
 return translations[l]?l:"en";
}

const translations={
pt:{
desc:"O SCAN é um sistema avançado que automatiza completamente o gerenciamento de mods no Spaceflight Simulator, tornando o processo mais simples, seguro e eficiente.",
download:"Baixar SCAN",
info:"Informações",

tutorial_download:"Como baixar",
how_download:"Baixe o arquivo ZIP, extraia para uma pasta e execute o programa.",

tutorial_use:"Como usar",
how_use:"Selecione a pasta do jogo, escolha os mods desejados e aplique as mudanças.",

ui_title:"Interface do SCAN",
ui_desc:"A interface principal permite navegar, selecionar e gerenciar mods de forma simples e organizada.",
mod_desc:"Durante a instalação, o SCAN gerencia automaticamente todos os arquivos e dependências.",

system:"Como funciona",
sys1:"Conecta-se a um repositório online.",
sys2:"Resolve dependências automaticamente.",
sys3:"Instala arquivos corretamente.",

why:"Por que usar o SCAN",
why1:"Evita erros de instalação manual.",
why2:"Centraliza o gerenciamento de mods.",
why3:"Projetado para expansão futura.",

warning:"Avisos",
warn1:"O SCAN está em desenvolvimento ativo.",
warn2:"Procurando colaboradores para ajudar no projeto.",

credits:"Créditos",
collab:"Projeto aberto a colaboração."
},

en:{
desc:"SCAN is an advanced system that automates mod management in Spaceflight Simulator.",
download:"Download SCAN",
info:"Information",

tutorial_download:"How to download",
how_download:"Download ZIP, extract and run.",

tutorial_use:"How to use",
how_use:"Select game folder, choose mods and apply.",

ui_title:"SCAN Interface",
ui_desc:"The main interface allows easy navigation and mod management.",
mod_desc:"During installation, SCAN handles all files and dependencies.",

system:"How it works",
sys1:"Connects to an online repository.",
sys2:"Resolves dependencies automatically.",
sys3:"Installs files correctly.",

why:"Why use SCAN",
why1:"Avoids manual installation errors.",
why2:"Centralizes mod management.",
why3:"Designed for future expansion.",

warning:"Notices",
warn1:"SCAN is under active development.",
warn2:"Looking for contributors.",

credits:"Credits",
collab:"Open for collaboration."
}
};

function setLang(l){
 if(l==="auto") l=getLang();
 document.querySelectorAll("[data-i18n]").forEach(el=>{
  let k=el.getAttribute("data-i18n");
  if(translations[l][k]) el.innerText=translations[l][k];
 });
 localStorage.setItem("lang",l);
}
setLang(localStorage.getItem("lang")||"auto");

/* ESTRELAS */
for(let i=0;i<150;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 s.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(s);
}

/* ESTRELA CADENTE */
setInterval(()=>{
 if(Math.random()<0.3){
  let star=document.createElement("div");
  star.className="shooting";
  star.style.left=Math.random()*50+"vw";
  star.style.top=Math.random()*30+"vh";
  document.body.appendChild(star);
  setTimeout(()=>star.remove(),1000);
 }
},4000);
</script>

</body>
</html>
