<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SCAN-SFSMM</title>

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/png" href="images/icon.png">

<style>
:root {
    --bg: #0b0f1a;
    --card: #111827;
    --accent: #3b82f6;
    --text: #cbd5e1;
}

body {
    margin: 0;
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* Estrelas */
.star { position: fixed; width: 2px; height: 2px; background: white; opacity: 0; animation: twinkle linear infinite; }
@keyframes twinkle {0% {opacity:0;}50% {opacity:1;}100% {opacity:0;}}

/* Estrela cadente */
.shooting { position: fixed; width: 3px; height: 3px; background: white; box-shadow:0 0 10px white; transform: rotate(45deg); animation: shoot 1s linear forwards;}
@keyframes shoot {to {transform: translate(400px,400px); opacity:0;}}

/* Header */
.header {display:flex; justify-content: space-between; padding: 20px 40px;}
.header a.credit {font-size: 12px; color: #64748b; text-decoration:none;}

/* Hero */
.hero {text-align:center; padding:100px 20px;}
.hero h1 {font-size:70px; color:white;}
.hero p {max-width:800px; margin:20px auto; line-height:1.8;}
.btn {margin-top:20px; display:inline-block; padding:12px 25px; background: var(--accent); color:white; text-decoration:none; border-radius:6px;}

/* Section */
.section {padding:80px 20px;}
.container {max-width:1000px; margin:auto;}
.card {background: var(--card); padding:30px; border-radius:8px; margin-top:20px;}
.card p {line-height:1.8;}
img {width:100%; border-radius:6px; margin-top:15px; box-shadow:0 0 20px #000;}
footer {text-align:center; padding:40px; color:#64748b;}
</style>
</head>

<body>

<div class="header">
    <div><b>SCAN</b></div>
    <select onchange="setLang(this.value)">
        <option value="auto">AUTO</option>
        <option value="pt">PT</option>
        <option value="en">EN</option>
    </select>
    <a class="credit" target="_blank" href="https://icons8.com/icon/VGQlJM067vkN/download">Baixar</a> ícone por <a class="credit" target="_blank" href="https://icons8.com">Icons8</a>
</div>

<!-- BLOCO 1 -->
<div class="hero">
    <h1>SCAN</h1>
    <p data-i18n="desc"></p>
    <a href="downloads/scan.zip" class="btn" data-i18n="download"></a>
</div>

<!-- BLOCO 2 -->
<div class="section">
<div class="container">

<h2 data-i18n="info"></h2>

<div class="card">
<h3 data-i18n="tutorial_download"></h3>
<p data-i18n="how_download"></p>
</div>

<div class="card">
<h3 data-i18n="tutorial_use"></h3>
<p data-i18n="how_use"></p>
</div>

<!-- Imagens mostrando UI -->
<div class="card">
<h3 data-i18n="ui_title"></h3>
<img src="images/ui.png">
<p data-i18n="ui_desc"></p>
<img src="images/mod.png">
<p data-i18n="mod_desc"></p>
</div>

<div class="card">
<h3 data-i18n="system"></h3>
<p data-i18n="sys1"></p>
<p data-i18n="sys2"></p>
<p data-i18n="sys3"></p>
</div>

<div class="card">
<h3 data-i18n="why"></h3>
<p data-i18n="why1"></p>
<p data-i18n="why2"></p>
<p data-i18n="why3"></p>
</div>

<div class="card">
<h3 data-i18n="warning"></h3>
<p data-i18n="warn1"></p>
<p data-i18n="warn2"></p>
</div>

</div>
</div>

<!-- BLOCO 3 -->
<div class="section">
<div class="container">
<h2 data-i18n="credits"></h2>
<div class="card">
<p><b>Del</b></p>
<p>DelDoSFS@outlook.com</p>
<p data-i18n="collab"></p>
</div>
</div>
</div>

<footer>SCAN • by Del</footer>

<script>
// Idioma automático
function getLang(){ let l=navigator.language.slice(0,2); return translations[l]?l:"en"; }
const translations={
pt:{
desc:"O SCAN (Spaceflight Comprehensive Archive Network) é um sistema completo para gerenciar mods do Spaceflight Simulator, automatizando instalação, organização e manutenção. Com ele, qualquer usuário consegue instalar mods de forma segura e eficiente, sem erros e sem complicações.",
download:"Baixar SCAN",
info:"Informações",
tutorial_download:"Como baixar",
how_download:"Baixe o arquivo ZIP, extraia-o para uma pasta de sua escolha e execute o programa principal. É rápido e seguro, permitindo acesso imediato ao sistema.",
tutorial_use:"Como usar",
how_use:"Selecione a pasta do jogo, escolha os mods desejados e clique em Aplicar mudanças. O SCAN organiza e instala automaticamente todos os arquivos necessários.",
ui_title:"Interface do SCAN",
ui_desc:"A interface principal mostra todos os mods disponíveis, permitindo navegar, selecionar e instalar de forma intuitiva.",
mod_desc:"Durante a instalação, o SCAN gerencia arquivos e dependências automaticamente para evitar erros.",
system:"Como funciona",
sys1:"Conecta-se a um repositório online seguro e atualizado.",
sys2:"Resolve dependências e conflitos entre mods automaticamente.",
sys3:"Instala arquivos nos locais corretos dentro do jogo sem intervenção manual.",
why:"Por que usar o SCAN",
why1:"Evita erros comuns de instalação manual e economiza tempo.",
why2:"Centraliza o gerenciamento de todos os mods em um só lugar.",
why3:"É escalável e preparado para futuras melhorias.",
warning:"Avisos",
warn1:"O SCAN ainda está em desenvolvimento ativo e pode mudar frequentemente.",
warn2:"Procurando colaboradores interessados em ajudar no projeto.",
credits:"Créditos",
collab:"Projeto aberto a colaboração."
},
en:{
desc:"SCAN (Spaceflight Comprehensive Archive Network) is a complete system to manage mods for Spaceflight Simulator. It automates installation, organization, and maintenance, making it easy and safe for anyone to install mods without errors.",
download:"Download SCAN",
info:"Information",
tutorial_download:"How to download",
how_download:"Download the ZIP file, extract it to a folder of your choice, and run the main program. Quick and safe, allowing immediate access to the system.",
tutorial_use:"How to use",
how_use:"Select the game folder, choose the desired mods, and click Apply Changes. SCAN automatically organizes and installs all necessary files.",
ui_title:"SCAN Interface",
ui_desc:"The main interface displays all available mods, allowing intuitive navigation, selection, and installation.",
mod_desc:"During installation, SCAN manages files and dependencies automatically to prevent errors.",
system:"How it works",
sys1:"Connects to a secure, up-to-date online repository.",
sys2:"Automatically resolves mod dependencies and conflicts.",
sys3:"Installs files into the correct game folders without manual intervention.",
why:"Why use SCAN",
why1:"Avoids common manual installation errors and saves time.",
why2:"Centralizes management of all mods in one place.",
why3:"Scalable and ready for future improvements.",
warning:"Notices",
warn1:"SCAN is under active development and may change frequently.",
warn2:"Looking for collaborators to help the project.",
credits:"Credits",
collab:"Open for collaboration."
}
};

function setLang(l){
 if(l==="auto") l=getLang();
 document.querySelectorAll("[data-i18n]").forEach(el=>{
  let k=el.getAttribute("data-i18n");
  if(translations[l][k]) el.innerText=translations[l][k];
 });
 localStorage.setItem("lang",l);
}
setLang(localStorage.getItem("lang")||"auto");

// Estrelas
for(let i=0;i<150;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 s.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(s);
}

// Estrelas cadentes
setInterval(()=>{
 if(Math.random()<0.3){
  let star=document.createElement("div");
  star.className="shooting";
  star.style.left=Math.random()*50+"vw";
  star.style.top=Math.random()*30+"vh";
  document.body.appendChild(star);
  setTimeout(()=>star.remove(),1000);
 }
},4000);
</script>

</body>
</html>
